<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hálux - Painel BI do Investidor</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{
  --bg:#1d2f21;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --blue:#2563eb;
  --blue-soft:#dbeafe;
  --green:#16a34a;
  --green-soft:#dcfce7;
  --gray:#9ca3af;
  --gray-soft:#f3f4f6;
  --amber:#d97706;
  --amber-soft:#fef3c7;
  --radius:18px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  height:50px;
  background:#1d2f21;
  color:#c9a84c;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 32px;
  position:sticky;
  top:0;
  z-index:999;
  box-shadow:0 8px 14px rgba(0, 1, 2, 0.3);
  margin-bottom: 10px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:22px;
  font-weight:700;
  white-space:nowrap;
}

.logo img{
  height:42px;
  width:auto;
  object-fit:contain;
}

.logo span{
  color:#d4af37;
}

.header-center{
  display:flex;
  justify-content:center;
  align-items:center;
  padding-left: 36px;
}

.header-center img{
  height:58px;
  width:auto;
  object-fit:contain;
}

.header-right{
  display:flex;
  align-items:center;
  gap:16px;
  justify-content: end;
}

.status{
  color:#c9a84c;
  font-size:11px;
  white-space:nowrap;
}

.refresh-btn{
  border:none;
  background:rgba(255,255,255,.12);
  color:#c9a84c;
  padding:8px 10px;
  border-radius:22px;
  cursor:pointer;
  font-family:inherit;
  transition:.2s;
}

.refresh-btn:hover{
  background:rgba(255,255,255,.2);
}

.container{
  max-width:1440px;
  margin:0 auto;
}

.panel-head{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-end;
  margin-bottom:20px;
}

.panel-kicker{
  color:var(--blue);
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-bottom:6px;
}

.panel-title{
  font-size:28px;
  font-weight:700;
  letter-spacing:-.03em;
}

.panel-subtitle{
  color:var(--muted);
  font-size:14px;
  margin-top:6px;
}

.switcher{
  display:flex;
  gap:12px;
  margin-bottom:10px;
  overflow-x:auto;
}

.switch-btn{
  border:1px solid #c9a84c;
  background:none;
  padding:8px 10px;
  border-radius:12px;
  cursor:pointer;
  font-family:inherit;
  font-weight:500;
  color:rgba(201, 168, 76);
  transition:.2s;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(15,23,42,.04);
  transition: .5s;
}

.switch-btn:hover{
  color:rgba(201, 168, 76);
  background-color: rgba(201, 168, 76, .4);
  border-color:rgba(201, 168, 76);
  transition: .5s;
;
}

.switch-btn.active{
  background:rgba(201, 168, 76);
  color:black;
  border-color:rgba(201, 168, 76);
  box-shadow:0 10px 22px rgba(37,99,235,.22);
  transition: .5s;
}

.dashboard-layout{
  display:grid;
  grid-template-columns:minmax(0, 1fr) minmax(420px, .95fr);
  gap:20px;
  align-items:stretch;
}

.dashboard-left,
.dashboard-right{
  display:flex;
  flex-direction:column;
  gap:20px;
  min-width:0;
  height:100%;
}

.dashboard-left > .grid,
.dashboard-right > .card{
  flex:1;
}

.dashboard-left .card,
.dashboard-right .card{
  display:flex;
  flex-direction:column;
  height:100%;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:20px;
  margin-bottom:0;
}

.metric-card{
  background:rgba(9, 165, 95, 0.1);
  border:1px solid #c9a84c;
  border-radius:var(--radius);
  padding:18px;
  box-shadow:0 6px 24px rgba(15,23,42,.045);
}

.metric-label{
  font-size:11px;
  color:#c9a84c;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:8px;
  font-weight:400;
}

.metric-value{
  font-size:22px;
  font-weight:700;
  letter-spacing:-.04em;
  color: #c9a84c;
}

.metric-sub{
  margin-top:8px;
  color:#c9a84c;
  font-size:11px;
  line-height:1.45;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:stretch;
  margin-bottom:0;
  flex:1;
}

.grid > .card{
  display:flex;
  flex-direction:column;
  height:100%;
}

@media(max-width:1100px){
  .dashboard-layout{
    grid-template-columns:1fr;
  }
}

@media(max-width:900px){
  .container{
    width:100%;
    max-width:none;
    padding:0 10px 24px;
  }

  .dashboard-layout{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .dashboard-left,
  .dashboard-right{
    gap:12px;
    height:auto;
  }

  .dashboard-left > .grid,
  .dashboard-right > .card{
    flex:initial;
  }

  .dashboard-left .card,
  .dashboard-right .card{
    height:auto;
  }

  .grid{
    grid-template-columns:1fr;
    gap:12px;
    flex:initial;
  }

  .metrics{
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
  }

  .panel-head{
    display:block;
  }

  .header{
    height:54px;
    grid-template-columns:auto 1fr auto;
    padding:8px 10px;
    gap:8px;
    align-items:center;
    position:sticky;
  }

  .logo img{
    height:30px !important;
    max-width:92px;
  }

  .header-center{
    padding-left:0;
  }

  .header-center img{
    height:30px !important;
  }

  .header-right{
    width:auto;
    justify-content:flex-end;
    gap:8px;
  }

  .status{
    font-size:9px;
  }

  .refresh-btn{
    padding:6px 8px;
    font-size:10px;
  }
}

.card{
  background:rgba(9, 165, 95, 0.1);
  border:1px solid #c9a84c;
  border-radius:var(--radius);
  padding:18px;
  box-shadow:0 6px 24px rgba(15,23,42,.045);
}

.card-title{
  font-size:11px;
  color:#c9a84c;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:8px;
  font-weight:400;
}

.progress-circle{
  display:flex;
  justify-content:center;
  align-items:center;
  flex:1;
  min-height:260px;
  margin:0;
}

.progress-circle svg{
  height:min(100%, 320px);
  width:auto;
  max-width:100%;
  display:block;
}

.service{
  padding:12px 0;
  border-bottom:1px solid #c9a84c;
}

.service:last-child{
  border-bottom:none;
}

.service-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
}

.service-name{
  font-size:13px;
  font-weight:400;
  color: #c9a84c;
}

.service-percent{
  font-size:12px;
  font-weight:400;
}

.service-meta{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
  font-size:11px;
  color:#c9a84c;
  font-weight: 1000;
  flex-wrap:wrap;
}

.badge{
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:400;
}

.badge.ok{
  background:var(--green-soft);
  color:var(--green);
}

.badge.andamento{
  background:var(--blue-soft);
  color:var(--blue);
}

.badge.pendente{
  background:var(--gray-soft);
  color:#6b7280;
}

.bar{ 
  height:8px; 
  background:rgba(0,0,0,0.2); 
  border-radius:999px; 
  overflow:hidden; }

.bar-fill{
  height:100%;
  border-radius:999px;
}

.photos-wrap{
position:relative;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.photos{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  animation:carouselFade .35s ease;
}

@keyframes carouselFade{
  from{
    opacity:.35;
    transform:translateX(8px);
  }

  to{
    opacity:1;
    transform:translateX(0);
  }
}

.photo-nav{
  position:absolute;
  top:45%;
  transform:translateY(-50%);
  width:38px;
  height:38px;
  border:none;
  border-radius:999px;
  background:rgba(8, 13, 27, 0.8);
  border:1px solid #c9a84c;
  color:#c9a84c;
  font-size:24px;
  cursor:pointer;
  display:flex;
  line-height: 33px;
  justify-content:center;
  box-shadow:0 10px 24px rgba(15,23,42,.22);
  z-index:5;
  opacity:.92;
}

.photo-nav:hover{
  opacity:1;
}

.photo-nav.prev{
  left:-18px;
}

.photo-nav.next{
  right:-18px;
}

.photo-counter{
  margin-top:12px;
  color:var(--muted);
  font-size:12px;
  text-align:center;
}

.photo-dots{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  margin-top:12px;
}

.photo-dot{
  width:8px;
  height:8px;
  border:none;
  border-radius:999px;
  background:rgba(0,0,0,0.2);
  cursor:pointer;
  transition:.2s;
}

.photo-dot.active{
  width:22px;
  background:#c9a84c;
}

.photos-card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.photos-card-head .card-title{
  margin-bottom:0;
}

.photo-see-more{
  border:none;
  background:transparent;
  color:#c9a84c;
  font-family:inherit;
  font-weight:500;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:none;
  outline:none;
}

.photo-see-more:hover{
  opacity:.8;
}

.photo-see-more:active{
  background:transparent;
  box-shadow:none;
}

.photo-see-more:focus{
  outline:none;
  box-shadow:none;
}

@media(max-width:700px){
  .photos{
    grid-template-columns:1fr;
  }
}

.photo{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  aspect-ratio:4/3;
  background:#f3f4f6;
  cursor:pointer;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.photo-placeholder{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:13px;
  padding:20px;
  text-align:center;
}

.photo-label{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.65);
  color:#c9a84c;
  font-size:12px;
  padding:10px;
}

.comparison-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid #c9a84c;
}

.comparison-row:last-child{
  border-bottom:none;
}

.comparison-name{
  width:140px;
  font-size:12px;
  font-weight:400;
  color:#c9a84c;
}

.comparison-bar-wrap{ 
  flex:1; 
  height:10px; 
  background:rgba(0,0,0,0.2); 
  border-radius:999px; 
  overflow:hidden; }

.comparison-bar{
  height:100%;
  border-radius:999px;
}

.comparison-percent{
  width:70px;
  text-align:right;
  font-weight:700;
  font-size:14px;
}

.comparison-value{
  min-width:120px;
  text-align:center;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:700;
}

.footer{
  text-align:center;
  padding:16px 20px;
  color:#c9a84c;
  font-size:13px;
}

.error{
  background:#fee2e2;
  border:1px solid #fecaca;
  color:#b91c1c;
  padding:18px;
  border-radius:16px;
  margin-bottom:24px;
  line-height:1.6;
}

.empty{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
  background:#f9fafb;
  border:1px dashed var(--border);
  border-radius:16px;
  padding:18px;
}

.photo-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
  padding:28px;
}

.photo-modal.open{
  display:flex;
}

.photo-modal-box{
  position:relative;
  width:min(980px, 94vw);
  max-height:90vh;
  background:#c9a84c;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 24px 70px rgba(0,0,0,.35);
}

.photo-modal-img{
  width:100%;
  max-height:76vh;
  object-fit:contain;
  display:block;
  background:#111827;
}

.photo-modal-caption{
  padding:16px 20px;
  color:#111827;
  font-size:14px;
  line-height:1.5;
}

.photo-modal-close,
.photo-modal-arrow{
  position:absolute;
  border:none;
  border-radius:999px;
  background:rgba(17,24,39,.88);
  color:#c9a84c;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height: 45px;
  z-index:3;
  border: 1px solid #c9a84c;
}

.photo-modal-close{
  top:14px;
  right:14px;
  width:38px;
  height:38px;
  font-size:24px;
}

.photo-modal-arrow{
  top:50%;
  transform:translateY(-50%);
  width:46px;
  height:46px;
  font-size:30px;
  padding-bottom: 5px;
}

.photo-modal-arrow.prev{
  left:14px;
}

.photo-modal-arrow.next{
  right:14px;
}

.gallery-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1900;
  padding:28px;
}

.gallery-modal.open{
  display:flex;
}

.gallery-modal-box{
  width:min(1120px, 94vw);
  max-height:88vh;
  background:#1d2f21;
  border-radius:22px;
  box-shadow:0 24px 70px rgba(0,0,0,.35);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.gallery-modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:18px 22px;
  box-shadow:0 8px 14px rgba(0, 1, 2, 0.3);
}

.gallery-modal-title{
  font-size:14px;
  font-weight:800;
  color:#c9a84c;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.gallery-modal-close{
  width:36px;
  height:36px;
  border:none;
  border-radius:999px;
  background:#111827;
  color:#c9a84c;
  font-size:22px;
  cursor:pointer;
}

.gallery-grid{
  padding:22px;
  overflow:auto;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
}

.gallery-grid::-webkit-scrollbar{
  width:4px;
}

.gallery-grid::-webkit-scrollbar-track{
  background:rgba(0,0,0,0.2);
  border-radius:999px;
}

.gallery-grid::-webkit-scrollbar-thumb{
  background:#c9a84c;
  border-radius:999px;
}

.gallery-grid::-webkit-scrollbar-thumb:hover{
  background:#d8b458;
}

.gallery-photo{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  background:#f3f4f6;
  cursor:pointer;
  min-height:260px;
}

.gallery-photo img{
  width:100%;
  height:100%;
  min-height:260px;
  object-fit:cover;
  display:block;
}

.gallery-photo-label{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.68);
  color:#c9a84c;
  font-size:13px;
  padding:12px;
}

@media(max-width:700px){
  .gallery-grid{
    grid-template-columns:1fr;
  }
} 

@media(max-width:700px){
  body{
    overflow-x:hidden;
  }

  .switcher{
    position:sticky;
    top:54px;
    z-index:900;
    background:#1d2f21;
    margin:0 -10px 10px;
    padding:8px 10px;
    gap:8px;
    box-shadow:0 8px 14px rgba(0, 1, 2, 0.22);
  }

  .switcher::-webkit-scrollbar{
    display:none;
  }

  .switch-btn{
    min-height:34px;
    padding:7px 12px;
    border-radius:999px;
    font-size:12px;
  }

  .card,
  .metric-card{
    border-radius:16px;
    padding:14px;
  }

  .metric-label,
  .card-title{
    font-size:9px;
    line-height:1.35;
    letter-spacing:.07em;
  }

  .metric-value{
    font-size:18px;
    line-height:1.2;
  }

  .metric-sub{
    font-size:10px;
    line-height:1.35;
  }

  .progress-circle{
    min-height:200px;
  }

  .progress-circle svg{
    max-height:220px;
  }

  .service{
    padding:10px 0;
  }

  .service-top{
    align-items:flex-start;
    margin-bottom:6px;
  }

  .service-name{
    font-size:12px;
    line-height:1.35;
  }

  .service-percent{
    font-size:12px;
    flex-shrink:0;
  }

  .service-meta{
    gap:6px;
    font-size:10px;
  }

  .badge{
    font-size:9px;
    padding:3px 7px;
  }

  .photos-card-head{
    align-items:flex-start;
  }

  .photo-see-more{
    font-size:11px;
    min-height:28px;
  }

  .photos{
    grid-template-columns:1fr;
    gap:10px;
  }

  .photo{
    aspect-ratio:16/10;
    border-radius:14px;
  }

  .photo-label{
    font-size:10px;
    padding:8px;
  }

  .photo-nav{
    width:34px;
    height:34px;
    top:50%;
    font-size:22px;
  }

  .photo-nav.prev{
    left:6px;
  }

  .photo-nav.next{
    right:6px;
  }

  .photo-dots{
    margin-top:10px;
  }

  .comparison-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px 10px;
    align-items:center;
    padding:12px 0;
  }

  .comparison-name{
    width:auto;
    min-width:0;
    font-size:11px;
  }

  .comparison-percent{
    width:auto;
    min-width:46px;
    font-size:12px;
  }

  .comparison-bar-wrap{
    grid-column:1 / -1;
    grid-row:2;
    height:8px;
  }

  .comparison-value{
    grid-column:1 / -1;
    width:100%;
    min-width:0;
    font-size:11px;
    padding:7px 10px;
  }

  .chart-wrap{
    height:230px !important;
    margin-top:18px !important;
  }

  .gallery-modal,
  .photo-modal{
    padding:12px;
  }

  .gallery-modal-box,
  .photo-modal-box{
    width:100%;
    max-height:92vh;
    border-radius:18px;
  }

  .gallery-modal-head{
    padding:14px;
  }

  .gallery-grid{
    grid-template-columns:1fr;
    padding:14px;
    gap:12px;
  }

  .gallery-photo,
  .gallery-photo img{
    min-height:190px;
  }

  .photo-modal-caption{
    padding:12px 14px;
    font-size:12px;
  }

  .photo-modal-arrow{
    width:40px;
    height:40px;
  }
}

@media(max-width:430px){
  .container{
    padding:0 8px 22px;
  }

  .header{
    padding:8px;
  }

  .logo img{
    max-width:76px;
  }

  .header-center img{
    height:28px !important;
  }

  .status{
    display:none;
  }

  .refresh-btn{
    max-width:74px;
    overflow:hidden;

<script>
const SHEET_ID = '__SHEET_ID__';
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=`;
const BASE_RAW = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=`;

let activeObraId = null;
let dados = { obras: [] };
let chartInst = null;
let fotoPaginaAtual = 0;
let fotosModal = [];
let fotoModalIndex = 0;
let fotosGaleriaAtual = [];
const FOTOS_POR_PAGINA = 2;
const imagensPrecarregadas = new Set();

const TEMA_PADRAO = {
  cor:'#2563eb',
  corSoft:'#dbeafe'
};

function brl(v){
  return Number(v || 0).toLocaleString('pt-BR', {
    style:'currency',
    currency:'BRL'
  });
}

function numero(v){
  if(v === null || v === undefined || v === '') return 0;
  if(typeof v === 'number') return v;

  const limpo = String(v)
    .replace(/[^\d,.-]/g, '')
    .replace(/\.(?=\d{3}(\D|$))/g, '')
    .replace(',', '.');

  return Number(limpo) || 0;
}

function texto(v){
  if(v === null || v === undefined) return '';
  return String(v).trim();
}

function normalizar(v){
  return texto(v)
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'_');
}

function sanitizarHTML(v){
  return texto(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function limitarPercentual(v){
  return Math.max(0, Math.min(100, numero(v)));
}

function extrairIdArquivoDrive(url){
  const value = texto(url);

  if(!value){
    return '';
  }

  const padroes = [
    /drive\.google\.com\/file\/d\/([^/]+)/,
    /drive\.google\.com\/open\?id=([^&]+)/,
    /drive\.google\.com\/uc\?[^#]*[?&]id=([^&]+)/,
    /drive\.google\.com\/thumbnail\?[^#]*[?&]id=([^&]+)/,
    /lh3\.googleusercontent\.com\/d\/([^/?#]+)/,
    /[?&]id=([^&]+)/
  ];

  for(const padrao of padroes){
    const match = value.match(padrao);

    if(match && match[1]){
      return decodeURIComponent(match[1]);
    }
  }

  return '';
}

function converterUrlImagem(url, largura = 1200){
  const value = texto(url);

  if(!value){
    return '';
  }

  const ehLinkDrive =
    value.includes('drive.google.com') ||
    value.includes('lh3.googleusercontent.com');

  if(!ehLinkDrive){
    return value;
  }

  const idArquivo = extrairIdArquivoDrive(value);

  if(!idArquivo){
    return value;
  }

  return `https://drive.google.com/thumbnail?id=${idArquivo}&sz=w${largura}`;
}

function converterUrlDrive(url){
  return converterUrlImagem(url, 900);
}

function converterUrlDriveAlta(url){
  return converterUrlImagem(url, 2200);
}

async function fetchSheet(sheet){
  const url = BASE + encodeURIComponent(sheet);
  const response = await fetch(url);

  if(!response.ok){
    throw new Error(`Erro ao carregar aba ${sheet}`);
  }

  const text = await response.text();
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  const json = JSON.parse(text.substring(start, end + 1));

  let cols = json.table.cols.map((c, i) => texto(c.label || c.id || `COL_${i}`));
  let rows = json.table.rows.map(row => {
    const obj = {};

    cols.forEach((col, i) => {
      obj[col] = row.c[i]?.f ?? row.c[i]?.v ?? '';
    });

    return obj;
  });

  const primeiraLinhaComoCabecalho = rows[0] || {};
  const valoresPrimeiraLinha = cols.map(col => texto(primeiraLinhaComoCabecalho[col]));
  const temCabecalhoNaPrimeiraLinha = valoresPrimeiraLinha.some(valor => valor.includes('—') || ['chave','servico','serviço','legenda'].includes(normalizar(valor)));

  if(temCabecalhoNaPrimeiraLinha){
    rows = rows.slice(1).map(row => {
      const obj = {};

      cols.forEach((col, i) => {
        const nomeColuna = valoresPrimeiraLinha[i] || col;
        obj[nomeColuna] = row[col];
      });

      return obj;
    });
  }

  return rows.filter(row => Object.values(row).some(valor => texto(valor) !== ''));
}


async function fetchSheetRaw(sheet){
  const url = BASE_RAW + encodeURIComponent(sheet);
  const response = await fetch(url);

  if(!response.ok){
    throw new Error(`Erro ao carregar aba ${sheet}`);
  }

  const text = await response.text();
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  const json = JSON.parse(text.substring(start, end + 1));

  return json.table.rows
    .map(row => {
      const totalColunas = json.table.cols.length;
      const valores = [];

      for(let i = 0; i < totalColunas; i += 1){
        valores.push(row.c[i]?.f ?? row.c[i]?.v ?? '');
      }

      return valores;
    })
    .filter(row => row.some(valor => texto(valor) !== ''));
}

function descobrirObrasConfigRaw(configRaw){
  const cabecalho = configRaw[0] || [];

  return cabecalho
    .map((valor, index) => ({ valor:texto(valor), index }))
    .filter(item => {
      if(item.index === 0) return false;

      const valorNormalizado = normalizar(item.valor).replace(/[^a-z0-9]/g, '');
      return valorNormalizado.includes('obra');
    })
    .map((item, index) => {
      const valorNormalizado = normalizar(item.valor).replace(/[^a-z0-9]/g, '');
      const match = valorNormalizado.match(/obra(\d+)/);
      const numeroObra = match ? Number(match[1]) : index + 1;

      return {
        id: numeroObra,
        colunaIndice: item.index,
        coluna: item.valor,
        tituloAba: `Obra${numeroObra}`,
        servicosSheet: `Servicos_${numeroObra}`,
        fotosSheet: `Fotos_${numeroObra}`,
        ...TEMA_PADRAO
      };
    })
    .sort((a, b) => a.id - b.id);
}

function obterLinhaConfigRaw(configRaw, chaves){
  const listaChaves = Array.isArray(chaves) ? chaves : [chaves];

  return configRaw.find(row => {
    const chaveLinha = texto(row[0]);
    return listaChaves.some(chave => compararChaveConfig(chaveLinha, chave));
  });
}

function obterValorConfigRaw(configRaw, chaves, obraRef){
  const linha = obterLinhaConfigRaw(configRaw, chaves);

  if(!linha){
    return '';
  }

  return linha[obraRef.colunaIndice] ?? '';
}

function obterDataConfigRaw(configRaw, chaves, obraRef){
  return formatarDataPlanilha(obterValorConfigRaw(configRaw, chaves, obraRef));
}

function valorPorColuna(obj, nomes){
  const chaves = Object.keys(obj);
  const nomesNormalizados = nomes.map(nome => normalizar(nome));

  for(const chave of chaves){
    const chaveNormalizada = normalizar(chave);

    if(nomesNormalizados.includes(chaveNormalizada)){
      const valor = obj[chave];

      if(valor !== undefined && valor !== null && valor !== ''){
        return valor;
      }
    }
  }

  return '';
}

function descobrirObras(config){
  if(!config.length) return [];

  const colunas = Object.keys(config[0]);

  return colunas
    .filter(col => {
      const colNormalizada = normalizar(col);
      return colNormalizada.includes('obra') && !colNormalizada.includes('chave');
    })
    .map((col, index) => {
      const normalizada = normalizar(col);
      const match = normalizada.match(/obra_?(\d+)/) || normalizada.match(/obra(\d+)/);
      const numeroObra = match ? Number(match[1]) : index + 1;

      return {
        id: numeroObra,
        coluna: col,
        tituloAba: `Obra${numeroObra}`,
        servicosSheet: `Servicos_${numeroObra}`,
        fotosSheet: `Fotos_${numeroObra}`,
        ...TEMA_PADRAO
      };
    })
    .sort((a,b) => a.id - b.id);
}

function mapearConfig(config){
  const cfg = {};

  config.forEach(item => {
    const chave = valorPorColuna(item, ['A — chave', 'A chave', 'chave', 'Chave']);
    if(!texto(chave)) return;

    cfg[normalizar(chave)] = item;
  });

  return cfg;
}

function compararChaveConfig(a, b){
  return normalizar(a).replace(/[^a-z0-9]/g, '') === normalizar(b).replace(/[^a-z0-9]/g, '');
}

function obterConfig(cfg, chave, coluna){
  const chaveEncontrada = Object.keys(cfg).find(k => compararChaveConfig(k, chave));

  if(!chaveEncontrada) return '';

  const linha = cfg[chaveEncontrada];
  if(!linha) return '';

  const colunaExata = Object.keys(linha).find(col => col === coluna);
  if(colunaExata && texto(linha[colunaExata]) !== '') return linha[colunaExata];

  const colunaNormalizada = normalizar(coluna);
  const colunaEncontrada = Object.keys(linha).find(col => normalizar(col) === colunaNormalizada);

  if(colunaEncontrada && texto(linha[colunaEncontrada]) !== ''){
    return linha[colunaEncontrada];
  }

  const colunaPorObra = Object.keys(linha).find(col => {
    const colNormalizada = normalizar(col).replace(/[^a-z0-9]/g, '');
    const alvoNormalizado = normalizar(coluna).replace(/[^a-z0-9]/g, '');

    return colNormalizada.includes(alvoNormalizado) || alvoNormalizado.includes(colNormalizada);
  });

  return colunaPorObra ? linha[colunaPorObra] : '';
}

function formatarDataPlanilha(valor){
  const value = texto(valor);

  if(!value) return '';

  const matchDate = value.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);

  if(matchDate){
    const ano = Number(matchDate[1]);
    const mes = Number(matchDate[2]);
    const data = new Date(ano, mes, Number(matchDate[3]));

    return data.toLocaleDateString('pt-BR', {
      month:'short',
      year:'numeric'
    }).replace('.', '');
  }

  return value;
}

function obterConfigPorChaves(cfg, chaves, coluna){
  for(const chave of chaves){
    const valor = obterConfig(cfg, chave, coluna);

    if(texto(valor) !== ''){
      return valor;
    }
  }

  return '';
}

function obterDataConfig(cfg, chaves, coluna){
  const listaChaves = Array.isArray(chaves) ? chaves : [chaves];
  return formatarDataPlanilha(obterConfigPorChaves(cfg, listaChaves, coluna));
}

function obterValorConfigDireto(config, chaves, obraRef){
  const listaChaves = Array.isArray(chaves) ? chaves : [chaves];

  for(const item of config){
    const entradas = Object.entries(item);
    const primeiraCelula = texto(entradas[0]?.[1]);

    const ehLinhaDesejada = listaChaves.some(chave => compararChaveConfig(primeiraCelula, chave));

    if(!ehLinhaDesejada){
      continue;
    }

    const colunaExata = entradas.find(([col]) => col === obraRef.coluna);

    if(colunaExata && texto(colunaExata[1]) !== ''){
      return colunaExata[1];
    }

    const numeroObra = String(obraRef.id);
    const colunaPorNumeroObra = entradas.find(([col, valor]) => {
      const colNormalizada = normalizar(col).replace(/[^a-z0-9]/g, '');
      return texto(valor) !== '' && colNormalizada.includes(`obra${numeroObra}`);
    });

    if(colunaPorNumeroObra){
      return colunaPorNumeroObra[1];
    }

    const colunaPorPosicao = entradas[obraRef.id];

    if(colunaPorPosicao && texto(colunaPorPosicao[1]) !== ''){
      return colunaPorPosicao[1];
    }
  }

  return '';
}

function obterDataConfigDireto(config, chaves, obraRef){
  return formatarDataPlanilha(obterValorConfigDireto(config, chaves, obraRef));
}

function obterNomeObraConfig(config, obraRef){
  const linhaNome = config.find(linha => {
    const primeiraCelula = texto(Object.values(linha)[0]);
    return compararChaveConfig(primeiraCelula, 'nome');
  });

  if(!linhaNome){
    return '';
  }

  const valorColunaExata = linhaNome[obraRef.coluna];

  if(texto(valorColunaExata) !== '' && !compararChaveConfig(valorColunaExata, obraRef.tituloAba || `Obra${obraRef.id}`)){
    return valorColunaExata;
  }

  const valoresLinha = Object.values(linhaNome);
  const valorPorPosicao = valoresLinha[obraRef.id];

  if(texto(valorPorPosicao) !== '' && !compararChaveConfig(valorPorPosicao, obraRef.tituloAba || `Obra${obraRef.id}`)){
    return valorPorPosicao;
  }

  return '';
}

function obterValorColunaDinamica(linha, coluna){
  const colunas = Object.keys(linha);

  const colunaExata = colunas.find(col => col === coluna);
  if(colunaExata && texto(linha[colunaExata]) !== '') return linha[colunaExata];

  const colunaNormalizada = normalizar(coluna).replace(/[^a-z0-9]/g, '');
  const colunaEncontrada = colunas.find(col => {
    const colNormalizada = normalizar(col).replace(/[^a-z0-9]/g, '');
    return colNormalizada === colunaNormalizada;
  });

  return colunaEncontrada ? linha[colunaEncontrada] : '';
}

function mapearServicos(servicos){
  return servicos
    .map(s => ({
      servico: valorPorColuna(s, ['A — servico', 'A — serviço', 'servico', 'Serviço', 'serviço']),
      percentual: valorPorColuna(s, ['B — percentual', 'percentual', 'Percentual']),
      inicio: valorPorColuna(s, ['C — inicio', 'C — início', 'inicio', 'Início']),
      fim: valorPorColuna(s, ['D — fim', 'fim', 'Fim']),
      status: valorPorColuna(s, ['E — status', 'status', 'Status'])
    }))
    .filter(s => texto(s.servico) !== '')
    .map(s => ({
      servico:texto(s.servico),
      percentual:limitarPercentual(s.percentual),
      inicio:texto(s.inicio),
      fim:texto(s.fim),
      status:normalizar(s.status)
    }));
}

function mapearFotos(fotos){
  return fotos
    .map(f => ({
      legenda: valorPorColuna(f, ['A — legenda', 'legenda', 'Legenda']),
      url: valorPorColuna(f, ['B — url', 'url', 'URL']),
      data: valorPorColuna(f, ['C — data', 'data', 'Data'])
    }))
    .filter(f => texto(f.legenda) !== '' || texto(f.url) !== '')
    .map(f => {
      const urlOriginal = texto(f.url);

      return {
        legenda:texto(f.legenda),
        url:converterUrlDrive(urlOriginal),
        fullUrl:converterUrlDriveAlta(urlOriginal),
        data:texto(f.data)
      };
    });
}

async function carregarAbaOpcional(sheet){
  try{
    return await fetchSheet(sheet);
  }catch(e){
    console.warn(`Aba opcional não encontrada: ${sheet}`, e);
    return [];
  }
}


async function fetchRangeRaw(sheet, range){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(sheet)}&range=${encodeURIComponent(range)}`;
  const response = await fetch(url);

  if(!response.ok){
    throw new Error(`Erro ao carregar intervalo ${range} da aba ${sheet}`);
  }

  const textResponse = await response.text();
  const start = textResponse.indexOf('{');
  const end = textResponse.lastIndexOf('}');
  const json = JSON.parse(textResponse.substring(start, end + 1));

  return json.table.rows.map(row => {
    const totalColunas = json.table.cols.length;
    const valores = [];

    for(let i = 0; i < totalColunas; i += 1){
      valores.push(row.c[i]?.f ?? row.c[i]?.v ?? '');
    }

    return valores;
  });
}

async function obterNomesObrasPorCelula(){
  const valores = await fetchRangeRaw('Config', 'B2:C2');
  const linha = valores[0] || [];

  return {
    1: texto(linha[0]),
    2: texto(linha[1])
  };
}

async function loadData(){
  try{
    document.getElementById('status').innerText = 'Sincronizando...';
    document.getElementById('error').innerHTML = '';

    const [config, nomesObrasPorCelula] = await Promise.all([
      fetchSheet('Config'),
      obterNomesObrasPorCelula()
    ]);

    const obrasDescobertas = descobrirObras(config);
    const cfg = mapearConfig(config);

    if(!obrasDescobertas.length){
      throw new Error('Nenhuma obra encontrada na aba Config. Verifique se existem colunas como B — obra1, C — obra2 etc.');
    }

    const obras = await Promise.all(obrasDescobertas.map(async obraRef => {
      const [servicosRaw, fotosRaw] = await Promise.all([
        carregarAbaOpcional(obraRef.servicosSheet),
        carregarAbaOpcional(obraRef.fotosSheet)
      ]);

      const total = numero(obterConfig(cfg, 'total', obraRef.coluna));
      const cotas = numero(obterConfig(cfg, 'cotas', obraRef.coluna));
      const valorInvestido = cotas ? total / cotas : total;
      const retornoPct = numero(obterConfig(cfg, 'retorno_pct', obraRef.coluna));
      const totalProjetado = valorInvestido * (1 + (retornoPct / 100));
      const rendimentoBruto = totalProjetado - valorInvestido;
      const servicos = mapearServicos(servicosRaw);
      const servicosAndamento = servicos
        .filter(s => s.status === 'andamento')
        .map(s => s.servico)
        .join(' / ');

      const inicioConfig = obterDataConfigDireto(
        config,
        ['inicio', 'início', 'data_inicio', 'data_início', 'inicio_obra', 'início_obra'],
        obraRef
      );

      const entregaConfig = obterDataConfigDireto(
        config,
        ['entrega', 'data_entrega', 'entrega_prevista', 'previsao_entrega', 'previsão_entrega', 'data_final', 'fim', 'termino', 'término'],
        obraRef
      );

      const nomeObra = texto(nomesObrasPorCelula[obraRef.id]) || texto(obterNomeObraConfig(config, obraRef)) || `Obra ${obraRef.id}`;

      return {
        id: obraRef.id,
        tituloAba: obraRef.tituloAba || `Obra${obraRef.id}`,
        nome: nomeObra,
        total,
        cotas,
        valorInvestido,
        rendimentoBruto,
        retornoPct,
        totalProjetado,
        progresso: limitarPercentual(obterConfig(cfg, 'progresso', obraRef.coluna)),
        etapa: texto(obterConfig(cfg, 'etapa_atual', obraRef.coluna)),
        inicio: inicioConfig,
        entrega: entregaConfig,
        servicosAndamento,
        servicos,
        fotos: mapearFotos(fotosRaw),
        cor: obraRef.cor,
        corSoft: obraRef.corSoft
      };
    }));

    dados = { obras };

    if(!activeObraId || !dados.obras.some(o => o.id === activeObraId)){
      activeObraId = dados.obras[0].id;
    }

    renderTabs();
    render();
    agendarPreloadFotos();

    document.getElementById('status').innerText = 'Atualizado agora';
  }catch(e){
    console.error(e);
    document.getElementById('status').innerText = 'Erro';
    document.getElementById('error').innerHTML = `
      <div class="error">
        <strong>Erro ao carregar planilha.</strong><br/><br/>
        Verifique se a planilha está pública e se as abas seguem o padrão Config, Servicos_1, Fotos_1 etc.<br/><br/>
        ${sanitizarHTML(e.message)}
      </div>
    `;
  }
}

function renderTabs(){
  const switcher = document.getElementById('switcher');

  switcher.innerHTML = dados.obras.map(obra => `
    <button
      class="switch-btn ${obra.id === activeObraId ? 'active' : ''}"
      onclick="changeObra(${obra.id})"
      title="${sanitizarHTML(obra.nome)}"
    >
      ${sanitizarHTML(obra.tituloAba || `Obra${obra.id}`)}
    </button>
  `).join('');
}

function changeObra(id){
  activeObraId = id;
  fotoPaginaAtual = 0;
  renderTabs();
  render();
}

function mudarPaginaFotos(direcao){
  const o = dados.obras.find(obra => obra.id === activeObraId);
  if(!o) return;

  const totalPaginas = Math.max(1, Math.ceil(o.fotos.length / FOTOS_POR_PAGINA));
  fotoPaginaAtual = (fotoPaginaAtual + direcao + totalPaginas) % totalPaginas;

  renderFotosCarousel();
}

function irParaPaginaFotos(pagina){
  fotoPaginaAtual = pagina;
  renderFotosCarousel();
}

function avancarCarouselFotos(){
  const modalAberto = document.getElementById('photoModal')?.classList.contains('open');

  if(modalAberto){
    return;
  }

  const o = dados.obras.find(obra => obra.id === activeObraId);

  if(!o || o.fotos.length <= FOTOS_POR_PAGINA){
    return;
  }

  mudarPaginaFotos(1);
}


function executarQuandoOcioso(callback, timeout = 800){
  if('requestIdleCallback' in window){
    requestIdleCallback(callback, { timeout });
    return;
  }

  setTimeout(callback, 250);
}

function preloadImagem(src){
  if(!src || imagensPrecarregadas.has(src)){
    return;
  }

  imagensPrecarregadas.add(src);

  const img = new Image();
  img.decoding = 'async';
  img.src = src;
}

function preloadListaImagens(urls, intervalo = 90){
  const lista = urls.filter(url => url && !imagensPrecarregadas.has(url));

  if(!lista.length){
    return;
  }

  let indice = 0;

  const carregarProxima = () => {
    if(indice >= lista.length){
      return;
    }

    preloadImagem(lista[indice]);
    indice += 1;

    setTimeout(carregarProxima, intervalo);
  };

  executarQuandoOcioso(carregarProxima);
}

function preloadFotosObra(obra, incluirAltaResolucao = false){
  if(!obra || !Array.isArray(obra.fotos)){
    return;
  }

  const urls = [];

  obra.fotos.forEach(foto => {
    if(foto.url){
      urls.push(foto.url);
    }

    if(incluirAltaResolucao && foto.fullUrl && foto.fullUrl !== foto.url){
      urls.push(foto.fullUrl);
    }
  });

  preloadListaImagens(urls);
}

function agendarPreloadFotos(){
  const obraAtiva = dados.obras.find(obra => obra.id === activeObraId);
  const outrasObras = dados.obras.filter(obra => obra.id !== activeObraId);

  executarQuandoOcioso(() => {
    preloadFotosObra(obraAtiva, false);
  });

  executarQuandoOcioso(() => {
    outrasObras.forEach((obra, index) => {
      setTimeout(() => preloadFotosObra(obra, false), index * 500);
    });
  }, 1600);
}

function preloadProximaPaginaFotos(obra, totalPaginasFotos){
  if(!obra || !obra.fotos || obra.fotos.length <= FOTOS_POR_PAGINA){
    return;
  }

  const proximaPagina = (fotoPaginaAtual + 1) % totalPaginasFotos;
  const inicio = proximaPagina * FOTOS_POR_PAGINA;
  const fotos = obra.fotos.slice(inicio, inicio + FOTOS_POR_PAGINA);
  const urls = fotos.map(foto => foto.url).filter(Boolean);

  preloadListaImagens(urls, 50);
}

function renderFotosCarousel(){
  const o = dados.obras.find(obra => obra.id === activeObraId);
  if(!o) return;

  const totalPaginasFotos = Math.max(1, Math.ceil(o.fotos.length / FOTOS_POR_PAGINA));

  if(fotoPaginaAtual >= totalPaginasFotos){
    fotoPaginaAtual = 0;
  }

  const inicioFotos = fotoPaginaAtual * FOTOS_POR_PAGINA;
  const fotosPagina = o.fotos.slice(inicioFotos, inicioFotos + FOTOS_POR_PAGINA);
  const photosWrap = document.querySelector('.photos-wrap');

  if(!photosWrap){
    return;
  }

  photosWrap.innerHTML = `
    ${o.fotos.length > FOTOS_POR_PAGINA ? `
      <button class="photo-nav prev" onclick="mudarPaginaFotos(-1)">‹</button>
      <button class="photo-nav next" onclick="mudarPaginaFotos(1)">›</button>
    ` : ''}

    <div class="photos">
      ${o.fotos.length ? fotosPagina.map((f, index) => {
        const fotoIndexReal = inicioFotos + index;

        return `
          <div class="photo" onclick="abrirModalFoto(${fotoIndexReal})">
            ${f.url ? `<img src="${sanitizarHTML(f.url)}" alt="${sanitizarHTML(f.legenda || 'Foto da obra')}" loading="${index === 0 ? 'eager' : 'lazy'}" decoding="async" fetchpriority="${index === 0 ? 'high' : 'auto'}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />` : ''}
            <div class="photo-placeholder" style="${f.url ? 'display:none;' : ''}">Imagem não disponível</div>
            <div class="photo-label">${sanitizarHTML(f.legenda || 'Sem legenda')} ${f.data ? '• ' + sanitizarHTML(f.data) : ''}</div>
          </div>
        `;
      }).join('') : '<div class="empty">Nenhuma foto cadastrada para esta obra.</div>'}
    </div>

    ${o.fotos.length > FOTOS_POR_PAGINA ? `
      <div class="photo-dots">
        ${Array.from({ length: totalPaginasFotos }).map((_, pagina) => `
          <button
            class="photo-dot ${pagina === fotoPaginaAtual ? 'active' : ''}"
            onclick="irParaPaginaFotos(${pagina})"
            aria-label="Ir para página ${pagina + 1} de fotos"
          ></button>
        `).join('')}
      </div>
    ` : ''}
  `;

  preloadProximaPaginaFotos(o, totalPaginasFotos);
}

function abrirModalFoto(index, origemFotos){
  const o = dados.obras.find(obra => obra.id === activeObraId);
  const listaFotos = origemFotos || o?.fotos || [];

  if(!listaFotos.length) return;

  fotosModal = listaFotos;
  fotoModalIndex = index;

  const fotoSelecionada = fotosModal[fotoModalIndex];

  if(fotoSelecionada?.fullUrl){
    preloadImagem(fotoSelecionada.fullUrl);
  }

  atualizarModalFoto();
  document.getElementById('photoModal').classList.add('open');
}

function fecharModalFoto(event){
  if(event && event.target && event.target.id !== 'photoModal') return;
  document.getElementById('photoModal').classList.remove('open');
}

function navegarModalFoto(direcao){
  if(!fotosModal.length) return;

  fotoModalIndex = (fotoModalIndex + direcao + fotosModal.length) % fotosModal.length;
  atualizarModalFoto();
}

function atualizarModalFoto(){
  const foto = fotosModal[fotoModalIndex];
  if(!foto) return;

  document.getElementById('photoModalImg').src = foto.fullUrl || foto.url || '';
  document.getElementById('photoModalCaption').innerHTML = `
    <strong>${sanitizarHTML(foto.legenda || 'Sem legenda')}</strong>
    ${foto.data ? `<br><span>${sanitizarHTML(foto.data)}</span>` : ''}
  `;
}

function abrirGaleriaFotos(){
  const o = dados.obras.find(obra => obra.id === activeObraId);
  if(!o || !o.fotos.length) return;

  fotosGaleriaAtual = o.fotos;

  document.getElementById('galleryGrid').innerHTML = fotosGaleriaAtual.map((foto, index) => `
    <div class="gallery-photo" onclick="abrirModalFoto(${index}, fotosGaleriaAtual)">
      ${foto.url ? `<img src="${sanitizarHTML(foto.url)}" alt="${sanitizarHTML(foto.legenda || 'Foto da obra')}" loading="lazy" decoding="async" />` : '<div class="photo-placeholder">Imagem não disponível</div>'}
      <div class="gallery-photo-label">
        ${sanitizarHTML(foto.legenda || 'Sem legenda')} ${foto.data ? '• ' + sanitizarHTML(foto.data) : ''}
      </div>
    </div>
  `).join('');

  document.getElementById('galleryModal').classList.add('open');
  executarQuandoOcioso(() => preloadFotosObra(o, true), 1200);
}

function fecharGaleriaFotos(event){
  if(event && event.target && event.target.id !== 'galleryModal') return;
  document.getElementById('galleryModal').classList.remove('open');
}

function badge(status){
  if(status === 'ok'){
    return '<span style="color: #c9a84c; background: none; border: 1px solid #c9a84c" class="badge ok">Concluído</span>';
  }

  if(status === 'andamento'){
    return '<span style="color: #c9a84c; background: none; border: 1px solid #c9a84c" class="badge andamento">Em andamento</span>';
  }

  return '<span style="color: #c9a84c; background: none; border: 1px solid #c9a84c" class="badge pendente">Pendente</span>';
}

function corStatus(status){
  if(status === 'ok') return '#c9a84c';
  if(status === 'andamento') return '#c9a84c';
  return '#c9a84c';
}

function render(){
  const o = dados.obras.find(obra => obra.id === activeObraId);
  if(!o) return;

  const radius = 44;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (o.progresso / 100) * circumference;
  const baseComparativo = o.valorInvestido || 0;

  document.getElementById('app').innerHTML = `
    <div class="dashboard-layout">
      <div class="dashboard-left">
        <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Valor investido</div>
        <div class="metric-value">${brl(o.valorInvestido)}</div>
        <div class="metric-sub">
          ${sanitizarHTML(o.inicio || '—')} → ${sanitizarHTML(o.entrega || '—')}
        </div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Rendimento Líquido</div>
        <div class="metric-value">${brl(o.rendimentoBruto)}</div>
        <div class="metric-sub">+${o.retornoPct}% retorno previsto</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Total projetado</div>
        <div class="metric-value">${brl(o.totalProjetado)}</div>
        <div class="metric-sub">ao final de 12 meses</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Andamento da obra</div>
        <div class="metric-value">${o.progresso}%</div>
        <div class="metric-sub">${sanitizarHTML(o.servicosAndamento || 'Nenhum serviço em andamento')}</div>
      </div>
    </div>

        <div class="grid">
      <div class="card" style="display:flex;flex-direction:column;height:100%;">
        <div class="card-title">Progresso geral</div>

        <div class="progress-circle">
          <svg width="160" height="160" viewBox="0 0 160 160" aria-label="Progresso geral da obra">
            <circle cx="80" cy="80" r="${radius}" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="12"></circle>
            <circle
              cx="80"
              cy="80"
              r="${radius}"
              fill="none"
              stroke="#c9a84c"
              stroke-width="12"
              stroke-linecap="round"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"
              transform="rotate(-90 80 80)"
            ></circle>
            <text x="80" y="78" text-anchor="middle"  font-size="15" font-weight="700" fill="#c9a84c">${o.progresso}%</text>
            <text x="80" y="98" text-anchor="middle" font-size="8" fill="#c9a84c"> ${o.progresso != 100 ? 'Em andamento' : 'Concluído'}</text>
          </svg>
        </div>

        <div style="text-align:center;color:#c9a84c;font-size:14px;margin-bottom:14px;">
          ${sanitizarHTML(o.nome)}
        </div>

        <div style="display:flex;justify-content:space-between;color:#c9a84c;font-size:13px;margin-bottom:10px;gap:12px;flex-wrap:wrap;">
          <span>Início: <strong style="color:#c9a84c;">${sanitizarHTML(o.inicio || '—')}</strong></span>
          <span>Entrega: <strong style="color:#c9a84c;">${sanitizarHTML(o.entrega || '—')}</strong></span>
        </div>

        <div style="margin-top:auto;">
          <div class="bar">
            <div class="bar-fill" style="width:${o.progresso}%;background:#c9a84c;"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Cronograma por serviço</div>

        ${o.servicos.length ? o.servicos.map(s => `
          <div class="service">
            <div class="service-top">
              <div class="service-name">${sanitizarHTML(s.servico)}</div>
              <div class="service-percent" style="color:#c9a84c;">${s.percentual}%</div>
            </div>

            <div class="service-meta">
              <span><strong>${sanitizarHTML(s.inicio || '—')} → ${sanitizarHTML(s.fim || '—')}</strong></span>
              ${badge(s.status)}
            </div>

            <div class="bar">
              <div class="bar-fill" style="width:${s.percentual}%;background:#c9a84c;"></div>
            </div>
          </div>
        `).join('') : '<div class="empty">Nenhum serviço cadastrado para esta obra.</div>'}
      </div>
    </div>
      </div>

      <div class="dashboard-right">
        <div class="card">
          <div class="photos-card-head">
            <div class="card-title">Registro fotográfico — ${sanitizarHTML(o.nome)}</div>
            ${o.fotos.length ? `
              <button class="photo-see-more" onclick="abrirGaleriaFotos()">
                Veja mais
              </button>
            ` : ''}
          </div>

      <div class="photos-wrap"></div>
        </div>

        <div class="card">
          <div class="card-title">Comparativo de investimentos — 12 meses · ${brl(baseComparativo)}</div>

      <div id="comparison-list"></div>

      <div class="chart-wrap" style="margin-top:24px;height:180px;position:relative;">
        <canvas id="chartComp"></canvas>
      </div>

      <p style="font-size:12px; color:#c9a84c; margin-top:12px; text-align:center;">
        Hálux: juros simples de 2% ao mês. Demais opções: juros compostos mensais.
      </p>
        </div>
      </div>
    </div>
  `;

  renderComparativo(baseComparativo);
  renderChart(baseComparativo);
  renderFotosCarousel();
}

function renderComparativo(base){
  const m = 12;
  const haluxFinal = base + base * 0.02 * m;
  const haluxRendimento = haluxFinal - base;
  const cdbFinal = base * Math.pow(1 + 0.12 / 12, m);
  const tesouroFinal = base * Math.pow(1 + 0.10 / 12, m);
  const poupancaFinal = base * Math.pow(1 + 0.0617 / 12, m);

  const itens = [
    { nome:'Hálux', final:haluxFinal, rendimento:haluxRendimento, pct:24, cor:'#c9a84c', bg:'#dbeafe', txt:'#1d4ed8' },
    { nome:'CDB 12% a.a.', final:cdbFinal, rendimento:cdbFinal - base, pct:12, cor:'#16a34a', bg:'#dcfce7', txt:'#15803d' },
    { nome:'Tesouro', final:tesouroFinal, rendimento:tesouroFinal - base, pct:10, cor:'#d97706', bg:'#fef3c7', txt:'#92400e' },
    { nome:'Poupança', final:poupancaFinal, rendimento:poupancaFinal - base, pct:((poupancaFinal - base) / (base || 1) * 100).toFixed(1), cor:'#9ca3af', bg:'#f3f4f6', txt:'#6b7280' }
  ];

  document.getElementById('comparison-list').innerHTML = itens.map(item => {
    const largura = haluxRendimento ? Math.round(item.rendimento / haluxRendimento * 100) : 0;

    return `
      <div class="comparison-row">
        <div 
  class="comparison-name" 
  style="
    color:${item.cor};
    font-weight:700;
  "
>
  <strong>${item.nome}</strong>
</div>
        <div class="comparison-bar-wrap">
          <div class="comparison-bar" style="width:${largura}%;background:${item.cor};"></div>
        </div>
        <div class="comparison-percent" style="color:${item.cor};">+${item.pct}%</div>
        <div 
  class="comparison-value" 
  style="
    background:transparent;
    color:${item.cor};
    border:1px solid ${item.cor};
  "
>
  ${brl(item.final)}
</div>
      </div>
    `;
  }).join('');
}

function renderChart(base){
  if(chartInst){
    chartInst.destroy();
  }

  const canvas = document.getElementById('chartComp');
  if(!canvas) return;

  const labels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  chartInst = new Chart(canvas, {
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:'Hálux',
          data:labels.map((_,i) => Math.round(base + base * 0.02 * (i + 1))),
          borderColor:'#c9a84c',
          backgroundColor:'rgba(37,99,235,0.07)',
          borderWidth:2.5,
          pointRadius:2,
          tension:.3,
          fill:true
        },
        {
          label:'CDB',
          data:labels.map((_,i) => Math.round(base * Math.pow(1 + 0.12 / 12, i + 1))),
          borderColor:'#16a34a',
          backgroundColor:'transparent',
          borderWidth:1.5,
          pointRadius:2,
          tension:.3,
          borderDash:[4,3]
        },
        {
          label:'Tesouro',
          data:labels.map((_,i) => Math.round(base * Math.pow(1 + 0.10 / 12, i + 1))),
          borderColor:'#d97706',
          backgroundColor:'transparent',
          borderWidth:1.5,
          pointRadius:2,
          tension:.3,
          borderDash:[2,3]
        },
        {
          label:'Poupança',
          data:labels.map((_,i) => Math.round(base * Math.pow(1 + 0.0617 / 12, i + 1))),
          borderColor:'#9ca3af',
          backgroundColor:'transparent',
          borderWidth:1.5,
          pointRadius:2,
          tension:.3,
          borderDash:[2,4]
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{ label:c => ` ${c.dataset.label}: ${brl(c.raw)}` } }
      },
      scales:{
        x:{
            ticks:{
              font:{ size:11 },
              color:'rgba(201, 168, 76)'
            },
            grid:{
              color:'rgba(233,233,233,0.1)'
            }
          },
          y:{
            ticks:{
              font:{ size:11 },
              color:'rgba(201, 168, 76)',
              callback:v => 'R$ ' + Math.round(v / 1000) + 'k'
            },
            grid:{
              color:'rgba(233,233,233,0.1)'
            }
          }
                }
              }
            });
          }

loadData();
setInterval(loadData, 30000);
setInterval(avancarCarouselFotos, 10000);
</script>
